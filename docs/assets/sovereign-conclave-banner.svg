<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="460" viewBox="0 0 1400 460" role="img" aria-labelledby="title desc">
  <title id="title">Sovereign Conclave banner</title>
  <desc id="desc">A dark strategic table with opposed seats, an evidence ledger, and a verified verdict.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#101827"/>
      <stop offset="0.52" stop-color="#172033"/>
      <stop offset="1" stop-color="#0d111a"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f5d37a"/>
      <stop offset="1" stop-color="#b8822d"/>
    </linearGradient>
    <linearGradient id="ledger" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7f3e8"/>
      <stop offset="1" stop-color="#d7c9a8"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1400" height="460" fill="url(#bg)"/>
  <path d="M0 384 C220 326 374 432 588 370 C799 309 905 241 1118 278 C1242 300 1325 346 1400 314 L1400 460 L0 460 Z" fill="#0a0f18" opacity="0.88"/>
  <circle cx="705" cy="231" r="146" fill="none" stroke="#31415f" stroke-width="2"/>
  <circle cx="705" cy="231" r="98" fill="none" stroke="#28364f" stroke-width="2" stroke-dasharray="8 10"/>

  <g filter="url(#softShadow)">
    <ellipse cx="705" cy="234" rx="244" ry="112" fill="#1f2a3d" stroke="#5c6f91" stroke-width="2"/>
    <ellipse cx="705" cy="234" rx="184" ry="78" fill="#131b2a" stroke="#34435f" stroke-width="2"/>
    <rect x="610" y="184" width="190" height="104" rx="8" fill="url(#ledger)" stroke="#fff8df" stroke-width="2"/>
    <line x1="632" y1="210" x2="779" y2="210" stroke="#73664b" stroke-width="3"/>
    <line x1="632" y1="236" x2="766" y2="236" stroke="#73664b" stroke-width="3"/>
    <line x1="632" y1="262" x2="748" y2="262" stroke="#73664b" stroke-width="3"/>
    <text x="705" y="173" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" fill="#f5d37a" font-weight="700">EVIDENCE LEDGER</text>
  </g>

  <g fill="url(#gold)" stroke="#ffe8a4" stroke-width="2">
    <circle cx="487" cy="151" r="22"/>
    <circle cx="572" cy="105" r="22"/>
    <circle cx="705" cy="83" r="22"/>
    <circle cx="838" cy="105" r="22"/>
    <circle cx="923" cy="151" r="22"/>
    <circle cx="487" cy="319" r="22"/>
    <circle cx="572" cy="365" r="22"/>
    <circle cx="705" cy="386" r="22"/>
    <circle cx="838" cy="365" r="22"/>
    <circle cx="923" cy="319" r="22"/>
  </g>

  <g stroke="#7d8fac" stroke-width="2" opacity="0.72">
    <line x1="509" y1="151" x2="610" y2="206"/>
    <line x1="594" y1="105" x2="654" y2="184"/>
    <line x1="705" y1="105" x2="705" y2="184"/>
    <line x1="816" y1="105" x2="756" y2="184"/>
    <line x1="901" y1="151" x2="800" y2="206"/>
    <line x1="509" y1="319" x2="610" y2="266"/>
    <line x1="594" y1="365" x2="654" y2="288"/>
    <line x1="705" y1="364" x2="705" y2="288"/>
    <line x1="816" y1="365" x2="756" y2="288"/>
    <line x1="901" y1="319" x2="800" y2="266"/>
  </g>

  <g font-family="Inter, Segoe UI, Arial, sans-serif">
    <text x="90" y="130" font-size="58" font-weight="800" fill="#f7f1df">Sovereign</text>
    <text x="90" y="190" font-size="58" font-weight="800" fill="#f5d37a">Conclave</text>
    <text x="92" y="238" font-size="22" fill="#cbd5e1">Evidence-grounded deliberation for hard decisions.</text>
    <text x="92" y="276" font-size="18" fill="#8fa3bf">Blind analysis. Real dissent. Verified claims. Advice only.</text>

    <rect x="1040" y="104" width="260" height="48" rx="6" fill="#17253a" stroke="#3c5477"/>
    <text x="1170" y="135" text-anchor="middle" font-size="18" fill="#f7f1df">33 seats</text>
    <rect x="1040" y="172" width="260" height="48" rx="6" fill="#17253a" stroke="#3c5477"/>
    <text x="1170" y="203" text-anchor="middle" font-size="18" fill="#f7f1df">12 profiles</text>
    <rect x="1040" y="240" width="260" height="48" rx="6" fill="#17253a" stroke="#3c5477"/>
    <text x="1170" y="271" text-anchor="middle" font-size="18" fill="#f7f1df">Marshall verifies</text>
    <rect x="1040" y="308" width="260" height="48" rx="6" fill="#17253a" stroke="#3c5477"/>
    <text x="1170" y="339" text-anchor="middle" font-size="18" fill="#f7f1df">Human decides</text>
  </g>

  <rect x="44" y="40" width="1312" height="380" rx="18" fill="none" stroke="#2b3b56" stroke-width="2"/>
</svg>
